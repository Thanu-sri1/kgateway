apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ey-cart-route 
  namespace: thanu-ns
spec:
  parentRefs:
    - name: example-gateway
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /cart
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /cart
      backendRefs:
        - name: ey
          port: 3000                